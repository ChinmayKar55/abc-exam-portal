networks:
  abc-exam-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [abc-exam-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [abc-exam-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${REGISTRY}/abc-exam-api:${API_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      REDIS_URL: redis:6379
      ENV: production
    volumes:
      - storage_data:/app/storage
    networks: [abc-exam-net]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  student:
    image: ${REGISTRY}/abc-exam-student:${STUDENT_TAG:-latest}
    restart: unless-stopped
    networks: [abc-exam-net]
    depends_on:
      api: { condition: service_healthy }

  admin:
    image: ${REGISTRY}/abc-exam-admin:${ADMIN_TAG:-latest}
    restart: unless-stopped
    networks: [abc-exam-net]
    depends_on:
      api: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [abc-exam-net]
    depends_on: [student, admin, api]
