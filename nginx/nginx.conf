events {}

http {
  resolver 127.0.0.11 valid=30s;

  # ── HTTP → HTTPS redirect ───────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Student portal ──────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name student.atchinlabs.tech;

    ssl_certificate     /etc/letsencrypt/live/student.atchinlabs.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/student.atchinlabs.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
      proxy_pass         http://student:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ── Admin portal ────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name admin.atchinlabs.tech;

    ssl_certificate     /etc/letsencrypt/live/student.atchinlabs.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/student.atchinlabs.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
      proxy_pass         http://admin:3001;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ── API ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.atchinlabs.tech;

    ssl_certificate     /etc/letsencrypt/live/student.atchinlabs.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/student.atchinlabs.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # WebSocket upgrade for exam room
    location /ws {
      proxy_pass             http://api:8081;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade    $http_upgrade;
      proxy_set_header       Connection "upgrade";
      proxy_set_header       Host       $host;
      proxy_read_timeout     3600s;
    }

    location / {
      proxy_pass         http://api:8081;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
